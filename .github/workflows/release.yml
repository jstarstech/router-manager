name: Release Binaries

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    env:
      VERSION: ${{ github.ref_type == 'tag' && github.ref_name || 'latest' }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Build Frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Build Go Binaries
        run: |
          LDFLAGS="-s -w -X 'main.Version=${{ env.VERSION }}'"

          mkdir -p release

          # Linux
          GOOS=linux GOARCH=amd64 go build -ldflags="$LDFLAGS" -o release/router-manager-$VERSION-linux-amd64
          GOOS=linux GOARCH=arm64 go build -ldflags="$LDFLAGS" -o release/router-manager-$VERSION-linux-arm64
          GOOS=linux GOARCH=arm GOARM=7 go build -ldflags="$LDFLAGS" -o release/router-manager-$VERSION-linux-armv7
          GOOS=linux GOARCH=arm GOARM=6 go build -ldflags="$LDFLAGS" -o release/router-manager-$VERSION-linux-armv6

          # Windows
          GOOS=windows GOARCH=amd64 go build -ldflags="$LDFLAGS" -o release/router-manager-$VERSION-windows-amd64.exe
          GOOS=windows GOARCH=arm64 go build -ldflags="$LDFLAGS" -o release/router-manager-$VERSION-windows-arm64.exe
          GOOS=windows GOARCH=386 go build -ldflags="$LDFLAGS" -o release/router-manager-$VERSION-windows-x86.exe

          # macOS
          GOOS=darwin GOARCH=amd64 go build -ldflags="$LDFLAGS" -o release/router-manager-$VERSION-darwin-amd64
          GOOS=darwin GOARCH=arm64 go build -ldflags="$LDFLAGS" -o release/router-manager-$VERSION-darwin-arm64

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/router-manager-${{ env.VERSION }}-linux-amd64
            release/router-manager-${{ env.VERSION }}-linux-arm64
            release/router-manager-${{ env.VERSION }}-linux-armv7
            release/router-manager-${{ env.VERSION }}-linux-armv6
            release/router-manager-${{ env.VERSION }}-windows-amd64.exe
            release/router-manager-${{ env.VERSION }}-windows-arm64.exe
            release/router-manager-${{ env.VERSION }}-windows-x86.exe
            release/router-manager-${{ env.VERSION }}-darwin-amd64
            release/router-manager-${{ env.VERSION }}-darwin-arm64
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
